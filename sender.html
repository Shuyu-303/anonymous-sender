<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>匿名发送 - Sender</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Screen helpers ── */
    .screen { display: none; width: 100%; max-width: 480px; height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* ── Login Screen ── */
    #login-screen {
      align-items: center;
      justify-content: center;
      padding: 40px 30px;
      text-align: center;
    }
    #login-screen h1 {
      font-size: 30px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #login-screen .sub {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
    }
    #login-screen label {
      display: block;
      text-align: left;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 5px;
      margin-top: 14px;
    }
    #login-screen input {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 16px;
      outline: none;
      transition: border 0.2s;
    }
    #login-screen input:focus { border-color: #667eea; }
    #login-screen input.code-input {
      font-size: 28px;
      letter-spacing: 10px;
      text-align: center;
      font-weight: 700;
    }
    #login-screen .hint {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
      text-align: left;
    }
    #login-screen button {
      margin-top: 28px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #login-screen button:hover { opacity: 0.9; }
    #login-screen button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.show { display: flex; }
    #modal-box {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 16px;
      max-width: 420px;
      width: 90%;
      padding: 36px 28px 28px;
      text-align: center;
      animation: popIn 0.35s ease-out;
    }
    @keyframes popIn {
      from { transform: scale(0.8) translateY(20px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    #modal-box h2 {
      font-size: 22px;
      margin-bottom: 4px;
    }
    #modal-box .warn-icon { font-size: 48px; margin-bottom: 10px; }
    #modal-box .code-big {
      background: #0f0f1a;
      border-radius: 10px;
      padding: 16px;
      margin: 18px 0;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 8px;
      color: #667eea;
      border: 1px dashed #2a2a4a;
      user-select: all;
      cursor: copy;
    }
    #modal-box .msg {
      font-size: 14px;
      line-height: 1.8;
      color: #ccc;
      margin-bottom: 16px;
      text-align: left;
    }
    #modal-box .msg strong { color: #ff6b6b; }
    #modal-box .timer-ring {
      width: 56px; height: 56px;
      margin: 0 auto 16px;
      position: relative;
    }
    #modal-box .timer-ring svg {
      transform: rotate(-90deg);
      width: 56px; height: 56px;
    }
    #modal-box .timer-ring .bg { fill: none; stroke: #2a2a4a; stroke-width: 4; }
    #modal-box .timer-ring .progress {
      fill: none; stroke: #667eea; stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s linear;
    }
    #modal-box .timer-ring .num {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #667eea;
    }
    #modal-box button {
      padding: 14px 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #modal-box button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      background: #333;
    }

    /* ── Chat Screen ── */
    #chat-screen { max-width: 700px; }
    #chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }
    #chat-header .left { text-align: left; }
    #chat-header .name { font-size: 18px; font-weight: 600; }
    #chat-header .code-label { font-size: 12px; color: #888; margin-top: 2px; }
    #chat-header .code-label span { color: #667eea; font-weight: 600; }
    #chat-header .badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      background: #2a2a4a;
      color: #4caf50;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #chat-messages::-webkit-scrollbar { width: 5px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.self {
      align-self: flex-end;
      background: linear-gradient(135deg, #667eea55, #764ba255);
      border-bottom-right-radius: 4px;
    }
    .msg.other {
      align-self: flex-start;
      background: #2a2a4a;
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      background: transparent;
      font-size: 12px;
      color: #666;
      padding: 4px 12px;
    }
    .msg .time {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
      text-align: right;
    }

    /* ── Input Area ── */
    #input-area {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      flex-shrink: 0;
    }
    #input-area input {
      flex: 1;
      padding: 12px 16px;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }
    #input-area input:focus { border-color: #667eea; }
    #input-area button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #input-area button:hover { opacity: 0.9; }
    #input-area button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #333;
      color: #e0e0e0;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      #login-screen { padding: 30px 20px; }
      #chat-screen { height: 100dvh; }
      .msg { max-width: 90%; }
    }
  </style>
</head>
<body>

  <!-- ─── TOAST ─── -->
  <div id="toast" class="toast"></div>

  <!-- ─── LOGIN SCREEN ─── -->
  <div id="login-screen" class="screen active">
    <h1>🕊️ 匿名发送</h1>
    <p class="sub">输入名字和6位数字代码，开始匿名发送</p>

    <label for="name-input">👤 你的名字</label>
    <input id="name-input" type="text" placeholder="输入昵称..." maxlength="20" autocomplete="off" />

    <label for="code-input">🔑 6位数字代码</label>
    <input id="code-input" class="code-input" type="text" placeholder="000000" maxlength="6" autocomplete="off" inputmode="numeric" />
    <div class="hint">请设置一个 <strong>6位数字</strong> 作为身份凭证，务必牢记</div>

    <button id="go-btn">GO 🚀</button>
  </div>

  <!-- ─── ANNOUNCEMENT MODAL ─── -->
  <div id="modal-overlay">
    <div id="modal-box">
      <div class="warn-icon">⚠️</div>
      <h2>重要提醒！</h2>
      <p style="color:#888;font-size:13px;margin-top:4px;">请务必保存好你的身份代码</p>

      <div class="code-big" id="modal-code-display" title="点击复制">000000</div>

      <div class="msg">
        <strong>这是你唯一的身份凭证！</strong><br /><br />
        • 该 <strong>6位数字代码</strong> 用于识别你的身份<br />
        • 关闭页面后，输入相同的 <strong>名字</strong> 和 <strong>代码</strong> 可恢复所有对话记录<br />
        • <strong style="color:#ff6b6b;">代码丢失将无法找回！</strong>
      </div>

      <!-- Circular countdown -->
      <div class="timer-ring" id="timer-ring">
        <svg viewBox="0 0 56 56">
          <circle class="bg" cx="28" cy="28" r="24" />
          <circle class="progress" id="timer-progress" cx="28" cy="28" r="24"
            stroke-dasharray="150.8" stroke-dashoffset="0" />
        </svg>
        <div class="num" id="timer-num">4</div>
      </div>

      <button id="modal-confirm" disabled>请等待 4 秒...</button>
    </div>
  </div>

  <!-- ─── CHAT SCREEN ─── -->
  <div id="chat-screen" class="screen">
    <div id="chat-header">
      <div class="left">
        <div class="name" id="chat-name-display">用户</div>
        <div class="code-label">代码: <span id="chat-code-display">000000</span></div>
      </div>
      <div class="badge" id="status-badge">● 在线</div>
    </div>

    <div id="chat-messages"></div>

    <div id="input-area">
      <input id="msg-input" type="text" placeholder="输入消息，按 Enter 发送..." autocomplete="off" />
      <button id="send-btn">发送</button>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════════
    // Firebase REST API Base URL
    // ══════════════════════════════════════════
    const FB_URL = 'https://bday16-6e803-default-rtdb.firebaseio.com';

    // ─── DOM refs ───
    const loginScreen   = document.getElementById('login-screen');
    const nameInput     = document.getElementById('name-input');
    const codeInput     = document.getElementById('code-input');
    const goBtn         = document.getElementById('go-btn');
    const modalOverlay  = document.getElementById('modal-overlay');
    const modalCodeDisp = document.getElementById('modal-code-display');
    const timerNum      = document.getElementById('timer-num');
    const timerProgress = document.getElementById('timer-progress');
    const modalConfirm  = document.getElementById('modal-confirm');
    const chatScreen    = document.getElementById('chat-screen');
    const chatNameDisp  = document.getElementById('chat-name-display');
    const chatCodeDisp  = document.getElementById('chat-code-display');
    const statusBadge   = document.getElementById('status-badge');
    const chatMessages  = document.getElementById('chat-messages');
    const msgInput      = document.getElementById('msg-input');
    const sendBtn       = document.getElementById('send-btn');
    const toast         = document.getElementById('toast');

    let myName = '';
    let myCode = '';
    let knownMessageKeys = new Set();  // track already-rendered messages
    let pollTimer = null;

    // ─── Helpers ───
    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }

    function showToast(msg, duration) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._hide);
      toast._hide = setTimeout(() => toast.classList.remove('show'), duration || 2500);
    }

    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    // ─── Check if code is already claimed by another user ───
    async function checkCodeConflict(code, name) {
      try {
        const res = await fetch(`${FB_URL}/messages.json?orderBy="senderCode"&equalTo="${code}"`);
        if (!res.ok) {
          // If query fails (no index), fall back to fetching all
          const allRes = await fetch(`${FB_URL}/messages.json`);
          if (!allRes.ok) return false;
          const allData = await allRes.json();
          if (!allData) return false;
          for (const msg of Object.values(allData)) {
            if (msg.senderCode === code && msg.senderName !== name) {
              return true; // conflict: same code, different name
            }
          }
          return false;
        }
        const data = await res.json();
        if (!data) return false;
        for (const msg of Object.values(data)) {
          if (msg.senderName !== name) {
            return true; // conflict: same code, different name
          }
        }
        return false;
      } catch (err) {
        console.error('Code check error:', err);
        return false; // on error, allow to proceed
      }
    }

    // ─── Code input: digits only ───
    codeInput.addEventListener('input', () => {
      codeInput.value = codeInput.value.replace(/\D/g, '');
    });

    // Enter triggers Go
    nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') codeInput.focus(); });
    codeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') goBtn.click(); });

    // ─── Go button ───
    goBtn.addEventListener('click', async () => {
      const name = nameInput.value.trim();
      const code = codeInput.value.trim();

      if (!name) { showToast('请输入你的名字'); return; }
      if (code.length !== 6 || !/^\d{6}$/.test(code)) {
        showToast('请输入6位数字代码 (000000-999999)');
        return;
      }

      myName = name;
      myCode = code;

      // 🔍 Check if code is already used by a different user
      goBtn.disabled = true;
      goBtn.textContent = '检查中...';

      const conflict = await checkCodeConflict(code, name);

      goBtn.disabled = false;
      goBtn.textContent = 'GO 🚀';

      if (conflict) {
        showToast('⚠️ 此代码已被其他用户使用，请更换一个6位数字代码', 3500);
        codeInput.value = '';
        codeInput.focus();
        return;
      }

      // Show modal
      modalCodeDisp.textContent = code;
      modalOverlay.classList.add('show');
      startCountdown();
    });

    // ─── Modal countdown ───
    let countdownActive = false;

    function startCountdown() {
      if (countdownActive) return;
      countdownActive = true;

      let remaining = 4;
      const circumference = 2 * Math.PI * 24; // r=24 → ~150.8

      modalConfirm.disabled = true;
      modalConfirm.textContent = `请等待 ${remaining} 秒...`;
      timerNum.textContent = remaining;
      timerProgress.style.strokeDashoffset = '0';

      const interval = setInterval(() => {
        remaining--;
        timerNum.textContent = remaining;
        // progress fills up: offset goes from 0 → circumference
        const progress = (4 - remaining) / 4;
        timerProgress.style.strokeDashoffset = circumference * progress;

        if (remaining <= 0) {
          clearInterval(interval);
          modalConfirm.disabled = false;
          modalConfirm.textContent = '我已记住，开始聊天 ✅';
          countdownActive = false;
          return;
        }
        modalConfirm.textContent = `请等待 ${remaining} 秒...`;
      }, 1000);
    }

    // ─── Modal confirm → enter chat ───
    modalConfirm.addEventListener('click', () => {
      if (modalConfirm.disabled) return;
      modalOverlay.classList.remove('show');
      enterChat();
    });

    // ─── Copy code on click ───
    modalCodeDisp.addEventListener('click', () => {
      navigator.clipboard.writeText(myCode).then(() => {
        showToast('✅ 代码已复制到剪贴板');
      }).catch(() => {});
    });

    // ══════════════════════════════════════════
    // ENTER CHAT
    // ══════════════════════════════════════════
    function enterChat() {
      loginScreen.classList.remove('active');
      chatScreen.classList.add('active');
      chatNameDisp.textContent = myName;
      chatCodeDisp.textContent = myCode;

      // Load previous messages
      loadMessages();

      // Start polling for new messages
      pollTimer = setInterval(pollNewMessages, 2000);

      msgInput.focus();
    }

    // ══════════════════════════════════════════
    // Firebase: Load & Poll Messages
    // ══════════════════════════════════════════
    async function loadMessages() {
      try {
        const res = await fetch(`${FB_URL}/messages.json`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data) return;

        const entries = Object.entries(data)
          .filter(([key, msg]) => msg.senderCode === myCode)
          .sort((a, b) => a[1].timestamp - b[1].timestamp);

        chatMessages.innerHTML = '';
        knownMessageKeys.clear();

        for (const [key, msg] of entries) {
          knownMessageKeys.add(key);
          renderMessage(msg, key);
        }

        scrollToBottom();
      } catch (err) {
        console.error('Load error:', err);
        showToast('⚠️ 无法连接到服务器');
      }
    }

    async function pollNewMessages() {
      try {
        const res = await fetch(`${FB_URL}/messages.json`);
        if (!res.ok) return;
        const data = await res.json();
        if (!data) return;

        const entries = Object.entries(data)
          .filter(([key, msg]) => msg.senderCode === myCode);

        let hasNew = false;
        for (const [key, msg] of entries) {
          if (!knownMessageKeys.has(key)) {
            knownMessageKeys.add(key);
            renderMessage(msg, key);
            hasNew = true;
          }
        }

        if (hasNew) scrollToBottom();
      } catch (_) {
        // silent on poll errors
      }
    }

    function renderMessage(msg, key) {
      const div = document.createElement('div');
      const isSelf = String(msg.senderCode) === String(myCode);

      if (msg.type === 'system') {
        div.className = 'msg system';
        div.textContent = msg.text;
      } else {
        div.className = `msg ${isSelf ? 'self' : 'other'}`;
        div.innerHTML = `
          <div>${escapeHtml(msg.text)}</div>
          <div class="time">${formatTime(msg.timestamp)}</div>
        `;
      }

      chatMessages.appendChild(div);
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });
    }

    // ══════════════════════════════════════════
    // Send message
    // ══════════════════════════════════════════
    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;

      sendBtn.disabled = true;

      try {
        const payload = {
          senderCode: myCode,
          senderName: myName,
          text,
          timestamp: Date.now()
        };

        const res = await fetch(`${FB_URL}/messages.json`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        msgInput.value = '';
        msgInput.focus();
      } catch (err) {
        console.error('Send error:', err);
        showToast('⚠️ 发送失败，请重试');
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // ─── Cleanup on page unload ───
    window.addEventListener('beforeunload', () => {
      if (pollTimer) clearInterval(pollTimer);
    });
  </script>
</body>
</html>
